<!doctype html>
<html>

<head>
    <meta charset="utf-8">
    <title>MCP Web Chat</title>
    <style>
        body {
            max-width: 800px;
            margin: 40px auto;
            font-family: Arial, Helvetica, sans-serif;
        }

        textarea {
            width: 100%;
            height: 200px;
        }

        button {
            margin-top: 12px;
            padding: 10px 20px;
            background-color: bisque;
        }

        select {
            margin-top: 12px;
            padding: 8px;
        }

        pre {
            white-space: pre-wrap;
            background: #f5f5f5;
            padding: 16px;
            border-radius: 8px;
            margin-top: 20px;
        }

        .login {
            margin-bottom: 20px;
            padding: 12px;
            background: #f5f5f5;
            border-radius: 8px;
        }
    </style>
</head>

<body>
    <h1>MCP Web Chat</h1>

    {% if user %}
        <div class="login">
            Logged in as: <strong>{{ user }}</strong>
            <br>
            <a href="/logout">Logout</a>
        </div>

        <label for="backend"><strong>Model backend:</strong></label>
        <br>
        <select id="backend">
            <option value="openrouter" selected>OpenRouter</option>
            <option value="ollama">Local model</option>
        </select>

        <br><br>

        <textarea id="msg" placeholder="Ask anything, external tools might be involved"></textarea>
        <br>
        <button onclick="send_message()">Send</button>

        <pre id="out">Response will appear here...</pre>
    {% else %}
        <div class="login">
            <a href="/login">Login with GitHub</a>
        </div>

        <pre>Please log in with GitHub before using the chat.</pre>
    {% endif %}

    <script>
        async function send_message() {
            const message = document.getElementById("msg").value;
            const backend = document.getElementById("backend").value;

            document.getElementById("out").textContent = "Waiting for reply.......";

            const res = await fetch("/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    message: message,
                    backend: backend
                })
            });

            const data = await res.json();
            document.getElementById("out").textContent =
                data.reply || data.error || "No response";
        }
    </script>
</body>

</html>
