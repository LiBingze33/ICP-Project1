<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>MCP Web Chat</title>
    <style>
        body {
            max-width: 800px;
            margin: 40px auto;
            font-family: Arial, Helvetica, sans-serif;
        }

        textarea {
            width: 100%;
            height: 200px;
        }

        button {
            margin-top: 12px;
            padding: 10px 20px;
            background-color: bisque;
        }

        pre {
            white-space: pre-wrap;
            background: #f5f5f5;
            padding: 16px;
            border-radius: 8px;
            margin-top: 20px;
        }

        .login {
            margin-bottom: 20px;
            padding: 12px;
            background: #f5f5f5;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <h1>MCP Web Chat</h1>

    <div class="login">
        <a href="/login">Login with GitHub</a>
        |
        <a href="/logout">Logout</a>
    </div>

    <textarea id="msg" placeholder="Ask anything, external tools might be involved"></textarea>
    <br>
    <button onclick="send_message()">Send</button>

    <pre id="out">Response will appear here...</pre>

    <script>
        async function send_message() {
            const message = document.getElementById("msg").value;
            document.getElementById("out").textContent = "Waiting for reply.......";

            const res = await fetch("/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message })
            });

            const data = await res.json();
            document.getElementById("out").textContent = data.reply || data.error || "No response";
        }
    </script>
</body>
</html>
